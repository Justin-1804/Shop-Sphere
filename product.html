<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product — ShopSphere Nigeria</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="container nav-inner">
    <a href="index.html" class="nav-logo">Shop<span class="c">Sphere</span><span class="dot"></span></a>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="shop.html">Shop</a>
      <a href="about.html">About</a>
      <a href="dashboard.html">Dashboard</a>
    </div>
    <div class="nav-actions">
      <button class="cart-btn" id="open-cart-btn">
        🛒<span class="cart-count" style="display:none">0</span>
      </button>
      <button class="hamburger"><span></span><span></span><span></span></button>
    </div>
  </div>
</nav>
<div class="mobile-menu">
  <a href="index.html">🏠 Home</a>
  <a href="shop.html">🛍️ Shop</a>
  <a href="about.html">ℹ️ About</a>
  <a href="checkout.html">💳 Checkout</a>
</div>

<div class="detail-page">
  <div class="container">

    <!-- Breadcrumb -->
    <div class="breadcrumb" id="breadcrumb">
      <a href="index.html">Home</a>
      <span class="bc-sep">›</span>
      <a href="shop.html">Shop</a>
      <span class="bc-sep">›</span>
      <span id="bc-name">Loading…</span>
    </div>

    <!-- Detail grid (rendered by JS) -->
    <div class="detail-grid" id="detail-content">
      <div style="grid-column:1/-1; display:flex; align-items:center; justify-content:center; height:300px; color:var(--text-muted)">
        Loading product…
      </div>
    </div>

    <!-- Related products -->
    <div id="related-section">
      <div style="text-align:center; margin-bottom:48px">
        <div class="ph-ey" style="display:inline-block; margin-bottom:12px">You May Also Like</div>
        <h2 style="font-family:var(--font-serif); font-size:clamp(1.6rem,3vw,2.2rem)">Related Products</h2>
      </div>
      <div class="products-grid" id="related-grid"></div>
    </div>

  </div>
</div>

<!-- FOOTER -->
<footer>
  <div class="container">
    <div class="footer-bottom" style="padding:24px 0">
      <span>© 2025 ShopSphere Nigeria. All rights reserved.</span>
      <div class="footer-bottom-links"><a href="index.html">Home</a><a href="shop.html">Shop</a></div>
    </div>
  </div>
</footer>

<!-- CART SIDEBAR -->
<div class="cart-overlay" id="cart-overlay"></div>
<aside class="cart-sidebar" id="cart-sidebar">
  <div class="cart-head">
    <h2 class="cart-head-title">🛒 Cart</h2>
    <span class="cart-ct-bubble" id="cart-ct-label">0</span>
    <button class="cart-close" id="close-cart-btn">✕</button>
  </div>
  <div class="cart-body" id="cart-items-body"></div>
  <div class="cart-foot" id="cart-footer" style="display:none">
    <div class="ct-row"><span>Subtotal</span><span id="cart-subtotal-val">₦0</span></div>
    <div class="ct-grand"><span>Total</span><span class="v" id="cart-total-val">₦0</span></div>
    <a href="checkout.html" class="btn btn-primary btn-block btn-lg">Checkout →</a>
    <a href="#" class="cart-clear-link" onclick="Cart.clear(); renderCartSidebar(); return false;">Clear cart</a>
  </div>
</aside>

<button class="back-to-top" id="back-to-top">↑</button>

<script src="core.js"></script>
<script>
  let currentQty = 1;
  const productId = parseInt(new URLSearchParams(window.location.search).get("id"));

  function renderProduct() {
    const p = getProductById(productId);
    if (!p) {
      document.getElementById("detail-content").innerHTML = `
        <div style="grid-column:1/-1; text-align:center; padding:80px 0">
          <div style="font-size:4rem; margin-bottom:16px">😕</div>
          <h2 style="font-family:var(--font-serif); margin-bottom:16px">Product not found</h2>
          <a href="shop.html" class="btn btn-primary">Back to Shop</a>
        </div>`;
      return;
    }

    document.title = `${p.name} — ShopSphere`;
    document.getElementById("bc-name").textContent = p.name;

    const discount = p.oldPrice ? Math.round((1 - p.price / p.oldPrice) * 100) : 0;
    const inWL = Wishlist.has(p.id);

    document.getElementById("detail-content").innerHTML = `
      <!-- Gallery -->
      <div>
        <div class="detail-main-img" id="main-img">
          ${p.image
            ? `<img src="${p.image}" alt="${p.name}" style="width:100%; height:100%; object-fit:contain; border-radius:var(--r-lg);" />`
            : p.emoji}
        </div>
        <div class="detail-thumbs">
          ${p.image
            ? `<div class="detail-thumb active"><img src="${p.image}" alt="${p.name}" style="width:100%;height:100%;object-fit:cover;border-radius:6px;" /></div>`
            : [p.emoji, p.emoji, p.emoji].map((e, i) => `<div class="detail-thumb${i===0 ? " active" : ""}" onclick="selectThumb(this, '${e}')">${e}</div>`).join("")
          }
        </div>
      </div>

      <!-- Info -->
      <div>
        <p class="detail-ey">${p.category}</p>
        <h1 class="detail-title">${p.name}</h1>

        <div class="detail-rating-row">
          <span class="stars" style="font-size:1rem">${renderStars(p.rating)}</span>
          <span class="rating-val">${p.rating}</span>
          <span class="rating-ct">(${p.reviews} reviews)</span>
        </div>

        <div class="detail-price-row">
          <span class="d-price">${formatPrice(p.price)}</span>
          ${p.oldPrice ? `<span class="d-was">${formatPrice(p.oldPrice)}</span>` : ""}
          ${discount > 0 ? `<span class="d-disc">${discount}% OFF</span>` : ""}
        </div>

        <div class="divider"></div>
        <p class="detail-desc">${p.desc}</p>
        <div class="divider"></div>

        <p style="font-size:0.78rem; font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.07em; margin-bottom:12px">Quantity</p>
        <div class="qty-row" style="margin-bottom:24px">
          <button class="qr-btn" onclick="changeQty(-1)">−</button>
          <span class="qr-num" id="qty-display">1</span>
          <button class="qr-btn" onclick="changeQty(1)">+</button>
        </div>

        <div class="detail-actions">
          <button class="btn btn-primary btn-lg" onclick="addToCartDetail()" style="flex:1">
            🛒 Add to Cart
          </button>
          <button class="btn btn-outline" onclick="toggleWishlistDetail(this)" id="wl-btn">
            ${inWL ? "❤️ Wishlisted" : "🤍 Wishlist"}
          </button>
        </div>

        <div class="detail-perks">
          <div class="dp-row">
            <span class="dp-ico">🚀</span>
            <span><strong>Delivery:</strong> Abeokuta ₦1,000 · Lagos ₦3,000 · Other States ₦6,000</span>
          </div>
          <div class="dp-row">
            <span class="dp-ico">✅</span>
            <span><strong>In Stock</strong> — Ready to ship today</span>
          </div>
          <div class="dp-row">
            <span class="dp-ico">↩️</span>
            <span><strong>7-day returns</strong> — No questions asked</span>
          </div>
          <div class="dp-row">
            <span class="dp-ico">💬</span>
            <span><strong>WhatsApp:</strong> <a href="https://wa.me/2348012345678" style="color:var(--primary); font-weight:700">+234 801 234 5678</a></span>
          </div>
        </div>
      </div>
    `;

    renderRelated(p);
  }

  function selectThumb(el, emoji) {
    document.querySelectorAll(".detail-thumb").forEach(t => t.classList.remove("active"));
    el.classList.add("active");
    document.getElementById("main-img").textContent = emoji;
  }

  function changeQty(delta) {
    currentQty = Math.max(1, Math.min(20, currentQty + delta));
    document.getElementById("qty-display").textContent = currentQty;
  }

  function addToCartDetail() {
    Cart.add(productId, currentQty);
    openCart();
  }

  function toggleWishlistDetail(btn) {
    const added = Wishlist.toggle(productId);
    btn.textContent = added ? "❤️ Wishlisted" : "🤍 Wishlist";
    showToast(added ? "Added to wishlist ❤️" : "Removed from wishlist", added ? "success" : "default");
  }

  function renderRelated(product) {
    const related = PRODUCTS.filter(p => p.category === product.category && p.id !== product.id).slice(0, 4);
    const grid = document.getElementById("related-grid");
    grid.innerHTML = related.map(p => productCardHTML(p)).join("");
    if (related.length === 0) document.getElementById("related-section").style.display = "none";
  }

  renderProduct();
</script>
</body>
</html>
