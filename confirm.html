<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Order Confirmed — ShopSphere</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<nav class="navbar">
  <div class="container nav-inner">
    <a href="index.html" class="nav-logo">Shop<span class="c">Sphere</span><span class="dot"></span></a>
    <div class="nav-actions">
      <button class="cart-btn" id="open-cart-btn">🛒<span class="cart-count" style="display:none">0</span></button>
    </div>
  </div>
</nav>

<div class="confirm-page">
  <div class="confirm-card">
    <div class="confirm-ico">✅</div>
    <h1 class="confirm-title">Order Placed!</h1>
    <p class="confirm-sub">Your WhatsApp message has been sent to our team. We'll confirm your order shortly.</p>
    <div class="confirm-id" id="confirm-order-id">Loading…</div>

    <div id="confirm-summary" style="text-align:left; margin-bottom:28px; font-size:0.9rem">
      <!-- rendered by JS -->
    </div>

    <div class="confirm-btns">
      <a href="shop.html" class="btn btn-primary btn-lg">Continue Shopping</a>
      <a href="index.html" class="btn btn-outline">Back to Home</a>
    </div>
  </div>
</div>

<div class="cart-overlay" id="cart-overlay"></div>
<aside class="cart-sidebar" id="cart-sidebar">
  <div class="cart-head">
    <h2 class="cart-head-title">🛒 Cart</h2>
    <span class="cart-ct-bubble" id="cart-ct-label">0</span>
    <button class="cart-close" id="close-cart-btn">✕</button>
  </div>
  <div class="cart-body" id="cart-items-body"></div>
  <div class="cart-foot" id="cart-footer" style="display:none">
    <div class="ct-row"><span>Subtotal</span><span id="cart-subtotal-val">₦0</span></div>
    <div class="ct-grand"><span>Total</span><span class="v" id="cart-total-val">₦0</span></div>
    <a href="checkout.html" class="btn btn-primary btn-block btn-lg">Checkout →</a>
  </div>
</aside>

<script src="core.js"></script>
<script>
  const order = JSON.parse(localStorage.getItem("ss_last_order") || "{}");

  if (order.orderId) {
    document.getElementById("confirm-order-id").textContent = `Order #${order.orderId}`;

    const items = (order.items || []).map(item => {
      const p = getProductById(item.id);
      return p ? `<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border)"><span>${p.emoji} ${p.name} ×${item.qty}</span><span style="font-weight:600;color:var(--primary)">${formatPrice(p.price * item.qty)}</span></div>` : "";
    }).join("");

    document.getElementById("confirm-summary").innerHTML = `
      <div style="background:var(--surface-2);border-radius:var(--radius-md);padding:20px 22px">
        <div style="font-weight:700;font-family:var(--font-display);margin-bottom:14px">📦 Order Details</div>
        <div style="margin-bottom:10px;font-size:0.83rem;color:var(--text-secondary)">
          <div><strong>Customer:</strong> ${order.name}</div>
          <div><strong>Phone:</strong> ${order.phone}</div>
          <div><strong>Delivery:</strong> ${order.deliveryMethodName} — ${order.zoneName}</div>
        </div>
        ${items}
        <div style="display:flex;justify-content:space-between;padding-top:12px;font-family:var(--font-display);font-weight:800;font-size:1.05rem">
          <span>Order Total</span><span style="color:var(--primary)">${formatPrice(order.total)}</span>
        </div>
      </div>
    `;
  } else {
    document.getElementById("confirm-order-id").textContent = "Order placed successfully";
  }
</script>
</body>
</html>
